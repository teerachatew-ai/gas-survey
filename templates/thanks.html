<!doctype html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ t('th_title') }} | PTT NGD</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="brand">
  <div class="logo">{{ t('brand') }}</div>
  <h1>{{ t('th_title') }}</h1>
  <div class="sub">{{ t('th_sub') }}</div>
</header>
<div class="wrap" style="text-align:center">
  <section class="card"><div class="card-body">
    <p style="font-size:17px">{{ t('th_msg') }}
    {% if ref %}<br>{{ t('th_ref') }} <strong>#{{ '%04d' % ref|int }}</strong>{% endif %}</p>
    <p>{{ t('th_contact') }}</p>
    <a class="btn teal" href="{{ url_for('survey') }}">{{ t('th_again') }}</a>
  </div></section>
</div>
</body>
</html>
