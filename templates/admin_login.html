<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เข้าสู่ระบบหลังบ้าน | PTT NGD Survey</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-box">
  <h1>ระบบหลังบ้าน — แบบสอบถามความต้องการใช้พลังงาน</h1>
  {% if error %}<p class="err">{{ error }}</p>{% endif %}
  <form method="post">
    <label class="f"><span class="lbl">ชื่อผู้ใช้ / Username</span>
      <input type="text" name="username" required autofocus></label>
    <label class="f" style="margin-top:10px"><span class="lbl">รหัสผ่าน / Password</span>
      <input type="password" name="password" required></label>
    <div style="margin-top:16px"><button class="btn" type="submit" style="width:100%">เข้าสู่ระบบ / Login</button></div>
  </form>
</div>
</body>
</html>
