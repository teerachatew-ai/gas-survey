services:
  - type: web
    name: pngd-gas-survey
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string in the Render dashboard
      - key: SURVEY_ADMIN_USER
        value: admin
      - key: SURVEY_ADMIN_PASSWORD
        sync: false          # set your own admin password in the Render dashboard
      - key: SURVEY_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.7
